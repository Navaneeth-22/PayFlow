server:
  port: 8080

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  cloud:
    discovery:
          enabled: false
#  autoconfigure:
#    exclude:
#          - org.springframework.cloud.client.discovery.composite.CompositeDiscoveryClientAutoConfiguration
#          - org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration

jwt:
  secret: "scbsufvsyu1767f12etvedUYCUSYVCSFYWTVGUYgyiVtvvUYV#v##$$^@@#CTJh"
  expiry-hours: 24

gateway:
  routes:
    - id: auth
      path: /api/v1/auth/**
      target: http://localhost:8081
      auth-required: false
    - id: accounts
      path: /api/v1/accounts/**
      target: http://localhost:8081
      auth-required: true
    - id: payments
      path: /api/v1/payments/**
      target: http://localhost:8081
      auth-required: true
    - id: ledger
      path: /api/v1/ledger/**
      target: http://localhost:8082
      auth-required: true
    - id: webhooks
      path: /api/v1/webhooks/**
      target: http://localhost:8084
      auth-required: true

resilience4j:
  circuitbreaker:
    instances:
      payment-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - java.lang.Exception
      ledger-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - java.lang.Exception
      notification-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - java.lang.Exception
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.payflow: DEBUG