server:
  port: 8084

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5435/payflow_notification
    username: payflow
    password: secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      pool-name: NotificationHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.payflow.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.LinkedHashMap
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all

  security:
    user:
      name: admin
      password: admin

# ── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

spring.threads.virtual.enabled: true

webhook:
  max-attempts: 5
  retry-delays-seconds: "30,120,480,1800,7200"
  timeout-seconds: 5

logging:
  level:
    com.payflow: DEBUG
    org.springframework.kafka: INFO