server:
  port: 8081

spring:
  application:
    name: payment-service

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow_payment
    username: payflow
    password: secret
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: PaymentHikariPool

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway ────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.payflow.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.LinkedHashMap

  # ── Security (disable for now — add JWT Day 2) ───────────
  security:
    user:
      name: admin
      password: admin

# ── Resilience4j ────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      paymentGateway:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      paymentGateway:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      paymentGateway:
        timeout-duration: 2s

# ── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
#  prometheus:
#    metrics:
#      export:
#        enabled: true

# ── Virtual Threads (Java 21) ────────────────────────────────
spring.threads.virtual.enabled: true

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    com.payflow: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG